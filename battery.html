<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Toko Sparepart HP</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f1f5f9;
padding-bottom:80px;
}

header{
background:#15803d;
color:white;
padding:16px;
text-align:center;
font-size:18px;
font-weight:bold;
}

.searchBox{
padding:10px;
background:white;
}

.searchBox input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.section{
margin:10px;
font-weight:bold;
color:#15803d;
}

.card{
background:white;
margin:10px;
padding:12px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.nama{
font-weight:bold;
font-size:14px;
}

.kode{
font-size:12px;
color:#666;
}

.harga{
color:#15803d;
font-weight:bold;
margin-top:6px;
}

button{
background:#15803d;
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
margin-top:8px;
}

.qtyBox{
margin-top:8px;
}

.qtyBox button{
padding:4px 10px;
}

.cartBtn{
position:fixed;
bottom:0;
width:100%;
background:#15803d;
color:white;
text-align:center;
padding:15px;
font-weight:bold;
text-decoration:none;
}

</style>
</head>

<body>

<header>🛠 Toko Sparepart HP</header>

<div class="searchBox">
<input type="text" id="search" placeholder="🔍 Cari produk...">
</div>

<div id="produkList"></div>

<a href="cart.html" class="cartBtn">🛒 Lihat Keranjang</a>

<script>

const sheetId="1iPbtRGldW5yz6tuUZ5oHzMGsnNb4cHyCbAEMkq51qK4";

let semuaProduk=[];
let cart=JSON.parse(localStorage.getItem("cart"))||[];

function rupiah(x){
return Math.round(x).toLocaleString("id-ID");
}


// ================= LOAD SHEET =================

loadSheet("BATRE","BATRE");


function loadSheet(sheetName,kategori){

fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?sheet=${sheetName}`)
.then(res=>res.text())
.then(data=>{

let json=JSON.parse(data.substr(47).slice(0,-2));

let rows=json.table.rows
.filter(r=>r.c && r.c[1])
.map((r,i)=>({

id:kategori+i,

nama:r.c[1]?.v || "",

harga:Number(r.c[3]?.v || 0),

kode:r.c[7]?.v || "",

kategori:kategori

}));

semuaProduk=[...semuaProduk,...rows];

render();

});

}


// ================= RENDER =================

function render(){

let list=document.getElementById("produkList");
let keyword=document.getElementById("search").value.toLowerCase();

list.innerHTML="";

["LCD","BATRE"].forEach(kat=>{

let produkKategori=semuaProduk.filter(p=>
p.kategori===kat &&
p.nama.toLowerCase().includes(keyword)
);

if(produkKategori.length==0)return;

let title=document.createElement("div");
title.className="section";
title.innerText=kat;
list.appendChild(title);

produkKategori.forEach(p=>{

let item=cart.find(c=>c.id===p.id);
let qty=item?item.qty:0;

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="nama">${p.nama}</div>
<div class="kode">${p.kode}</div>
<div class="harga">Rp ${rupiah(p.harga)}</div>
`;

if(qty==0){

let btn=document.createElement("button");
btn.innerText="+ Tambah";

btn.onclick=()=>tambah(p);

card.appendChild(btn);

}else{

let box=document.createElement("div");
box.className="qtyBox";

box.innerHTML=`
<button onclick="kurang('${p.id}')">-</button>
 ${qty}
<button onclick="tambahQty('${p.id}')">+</button>
`;

card.appendChild(box);

}

list.appendChild(card);

});

});

}


// ================= CART =================

function tambah(p){

let item=cart.find(x=>x.id===p.id);

if(item){

item.qty++;

}else{

cart.push({...p,qty:1});

}

simpan();

}

function tambahQty(id){

let item=cart.find(p=>p.id===id);

if(item)item.qty++;

simpan();

}

function kurang(id){

let item=cart.find(p=>p.id===id);

if(item){

item.qty--;

if(item.qty<=0){

cart=cart.filter(p=>p.id!==id);

}

}

simpan();

}

function simpan(){

localStorage.setItem("cart",JSON.stringify(cart));
render();

}


// ================= SEARCH =================

document.getElementById("search").addEventListener("keyup",render);

</script>

</body>
</html>
