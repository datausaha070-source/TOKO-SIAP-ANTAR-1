<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PART HP | TOKO SIAP ANTAR</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f6f9;
}

/* HEADER */

.header{
background:#15803d;
color:white;
padding:15px;
text-align:center;
font-weight:bold;
font-size:18px;
}

/* PRODUK GRID */

.produk-container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
max-width:1000px;
margin:auto;
}

/* DESKTOP */

@media (min-width:900px){

.produk-container{
grid-template-columns:repeat(5,1fr);
max-width:1400px;
}

}

/* CARD */

.produk-card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,0.12);
display:flex;
flex-direction:column;
}

/* FOTO */

.produk-img-box{
height:180px;
background:linear-gradient(135deg,#16a34a,#f97316);
display:flex;
align-items:center;
justify-content:center;
}

.produk-img{
max-height:140px;
max-width:80%;
object-fit:contain;
border-radius:12px;
cursor:pointer;
}

/* INFO */

.produk-info{
padding:10px;
display:flex;
flex-direction:column;
flex:1;
}

.produk-nama{
font-size:13px;
font-weight:bold;
}

.produk-deskripsi{
font-size:12px;
color:#666;
margin:4px 0;
}

.produk-harga{
color:#ff6a00;
font-size:13px;
font-weight:bold;
margin:6px 0;
}

/* BUTTON */

.btn-cart{
background:#16a34a;
color:white;
border:none;
font-weight:bold;
padding:8px 12px;
border-radius:6px;
transition:0.2s;
}

.btn-cart:hover{
background:#15803d;
}
/* CART FLOAT */

#cartFloat{
position:fixed;
top:500px;
left:10px;

background:linear-gradient(135deg,#f97316,#16a34a);

color:white;
padding:10px 16px;
border-radius:50px;

font-weight:600;
border:3px solid #facc15;

box-shadow:0 8px 20px rgba(0,0,0,0.25);

cursor:pointer;
z-index:9999;

transition:0.2s;
}
#cartFloat:hover{
transform:scale(1.08);
}
/* ZOOM FOTO */

#zoomPopup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
align-items:center;
justify-content:center;
z-index:9999;
padding:20px;
}

#zoomPopup img{
max-width:95%;
max-height:80%;
border-radius:12px;
}

.zoomBox{
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

.zoomClose{
position:absolute;
top:-15px;
right:-15px;
background:red;
color:white;
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

/* POPUP */

.popup-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.popup-box{
background:white;
padding:20px;
border-radius:12px;
width:80%;
max-width:300px;
text-align:center;
}

.popup-box button{
background:#15803d;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="header">
📱 PART HP
</div>

<!-- FLOAT CART -->

<div id="cartFloat" onclick="window.location.href='cart.html'">
🛒 Keranjang
</div>

<!-- PRODUK -->

<div id="produkList" class="produk-container"></div>


<!-- ZOOM FOTO -->

<div id="zoomPopup" onclick="tutupZoom()">
<div class="zoomBox">
<span class="zoomClose" onclick="tutupZoom()">✕</span>
<img id="zoomImg">
</div>
</div>

<script>

/* CONVERT LINK DRIVE */

function convertDrive(link){

if(!link) return "";

let id="";

if(link.includes("id=")){
id=link.split("id=")[1].split("&")[0];
}

else if(link.includes("/d/")){
id=link.split("/d/")[1].split("/")[0];
}

return "https://drive.google.com/thumbnail?id="+id+"&sz=w1000";

}


/* TAMBAH KERANJANG */

function tambahKeranjang(nama,harga){

let cart=JSON.parse(localStorage.getItem("cart")) || [];

let index=cart.findIndex(p=>p.nama===nama);

if(index>=0){

cart[index].qty+=1;

}else{

cart.push({
nama:nama,
harga:Number(harga),
qty:1
});

}

localStorage.setItem("cart",JSON.stringify(cart));

popup("Produk yang anda pilih sudah dimasukkan ke keranjang");

}


/* POPUP TOKO */

function popup(pesan){

let box=document.createElement("div");

box.className="popup-bg";

box.innerHTML=`
<div class="popup-box">

<h3 style="color:#15803d">TOKO SIAP ANTAR</h3>

<p>${pesan}</p>

<button onclick="this.parentElement.parentElement.remove()">OK</button>

</div>
`;

document.body.appendChild(box);

}


/* ZOOM FOTO */

function zoomFoto(src){

document.getElementById("zoomImg").src=src;

document.getElementById("zoomPopup").style.display="flex";

}

function tutupZoom(){

document.getElementById("zoomPopup").style.display="none";

}


/* AMBIL DATA GOOGLE SHEET */

const sheetURL="https://docs.google.com/spreadsheets/d/19AfachAS9ZyNuut61RB1wqyI_AI6BsmNT1SIWhmSIn8/gviz/tq?sheet=MEMBER";


fetch(sheetURL)

.then(res=>res.text())

.then(data=>{

const json=JSON.parse(data.substring(47).slice(0,-2));

let rows=json.table.rows;

let html="";

rows.forEach(r=>{

let nama=r.c[1]?.v;
let deskripsi=r.c[2]?.v;
let harga=r.c[3]?.v;
let foto=convertDrive(r.c[4]?.v);

if(!nama) return;

html+=`

<div class="produk-card">

<div class="produk-img-box">

<img src="${foto}" class="produk-img"
onclick="zoomFoto('${foto}')">

</div>

<div class="produk-info">

<div class="produk-nama">${nama}</div>

<div class="produk-deskripsi">${deskripsi ?? ""}</div>

<div class="produk-harga">
Rp ${Number(harga).toLocaleString()}
</div>

<button class="btn-cart"
onclick="tambahKeranjang('${nama}','${harga}')">

+ Keranjang

</button>

</div>

</div>

`;

});

document.getElementById("produkList").innerHTML=html;

});

</script>

</body>
</html>
