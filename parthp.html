<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PART HP</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

.header{
background:#15803d;
color:white;
padding:15px;
text-align:center;
font-weight:bold;
}

.produk-container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
max-width:1000px;
margin:auto;
}

.produk-card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
}

.produk-img-box{
height:180px;
background:linear-gradient(135deg,#16a34a,#f97316);
display:flex;
align-items:center;
justify-content:center;
}

.produk-img{
max-height:140px;
max-width:80%;
}

.produk-info{
padding:10px;
}

.produk-nama{
font-weight:bold;
font-size:13px;
}

.produk-deskripsi{
font-size:12px;
color:#555;
margin:4px 0;
}

.produk-harga{
color:#15803d;
font-weight:bold;
margin:6px 0;
}

.btn-cart{
background:#15803d;
color:white;
border:none;
padding:8px;
border-radius:6px;
cursor:pointer;
width:100%;
}

#cartFloat{
position:fixed;
top:80px;
left:10px;
background:#15803d;
color:white;
padding:10px 18px;
border-radius:40px;
border:4px solid orange;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="header">📱 PART HP</div>

<div id="cartFloat" onclick="window.location.href='cart.html'">
🛒 Keranjang
</div>

<div id="produkList" class="produk-container"></div>

<script>

function convertDrive(link){

if(!link) return "";

let id="";

if(link.includes("id=")){
id = link.split("id=")[1].split("&")[0];
}
else if(link.includes("/d/")){
id = link.split("/d/")[1].split("/")[0];
}

return "https://drive.google.com/thumbnail?id="+id+"&sz=w1000";

}

function tambahKeranjang(nama,harga){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let index = cart.findIndex(p => p.nama === nama);

if(index >= 0){

cart[index].qty += 1;

}else{

cart.push({
nama:nama,
harga:Number(harga),
qty:1
});

}

localStorage.setItem("cart",JSON.stringify(cart));

alert("Produk masuk keranjang");

}

const sheetURL="https://docs.google.com/spreadsheets/d/19AfachAS9ZyNuut61RB1wqyI_AI6BsmNT1SIWhmSIn8/gviz/tq?sheet=PART%20HP";

fetch(sheetURL)

.then(res=>res.text())

.then(data=>{

const json=JSON.parse(data.substring(47).slice(0,-2));

let rows=json.table.rows;

let html="";

rows.forEach(r=>{

let nama=r.c[1]?.v;
let deskripsi=r.c[2]?.v;
let harga=r.c[3]?.v;
let foto=convertDrive(r.c[4]?.v);

if(!nama) return;

html+=`

<div class="produk-card">

<div class="produk-img-box">
<img src="${foto}" class="produk-img">
</div>

<div class="produk-info">

<div class="produk-nama">${nama}</div>

<div class="produk-deskripsi">
${deskripsi ?? ""}
</div>

<div class="produk-harga">
Rp ${Number(harga).toLocaleString()}
</div>

<button class="btn-cart"
onclick="tambahKeranjang('${nama}','${harga}')">
+ Keranjang
</button>

</div>

</div>

`;

});

document.getElementById("produkList").innerHTML = html;

});

</script>

</body>
</html>
