<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PART HP | TOKO SIAP ANTAR</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:#f4f6f9;
}

.header{
text-align:center;
padding:20px;
font-size:24px;
font-weight:bold;
color:#16a34a;
}

/* GRID PRODUK */

.produk-container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
max-width:1000px;
margin:auto;
}

.produk-card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,0.12);
display:flex;
flex-direction:column;
}

.produk-img-box{
height:180px;
background:linear-gradient(135deg,#16a34a,#f97316);
display:flex;
align-items:center;
justify-content:center;
}

.produk-img{
max-height:140px;
max-width:80%;
object-fit:contain;
border-radius:16px;
}

.produk-info{
padding:10px;
display:flex;
flex-direction:column;
flex:1;
}

.produk-nama{
font-size:13px;
font-weight:bold;
}

.produk-deskripsi{
font-size:12px;
color:#666;
margin:4px 0;
}

.produk-harga{
color:#ff6a00;
font-size:14px;
font-weight:bold;
margin-bottom:8px;
}

.btn-cart{
background:#16a34a;
color:white;
border:none;
padding:8px;
border-radius:6px;
cursor:pointer;
}

#cartFloat{
position:fixed;
top:20px;
right:20px;
background:#16a34a;
color:white;
padding:10px 16px;
border-radius:50px;
font-weight:bold;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

#cartCount{
background:#ff9800;
padding:3px 8px;
border-radius:50px;
font-size:12px;
margin-left:5px;
}

</style>

</head>

<body>

<div id="cartFloat" onclick="window.location.href='cart.html'">
🛒 Keranjang <span id="cartCount">0</span>
</div>

<div class="header">
📱 PART HP
</div>

<div id="produkList" class="produk-container"></div>

<script>

function updateCartCount(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

cart.forEach(p=>{

total += p.qty;

});

document.getElementById("cartCount").innerText = total;

}

updateCartCount();

function tambahKeranjang(nama,harga,foto){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let index = cart.findIndex(p => p.nama === nama);

if(index >= 0){

cart[index].qty += 1;

}else{

cart.push({
nama:nama,
harga:Number(harga),
foto:foto,
qty:1
});

}

localStorage.setItem("cart",JSON.stringify(cart));

updateCartCount();

alert("Produk masuk keranjang");

}

function convertDrive(link){

if(!link) return "";

let id="";

if(link.includes("id=")){

id = link.split("id=")[1].split("&")[0];

}

else if(link.includes("/d/")){

id = link.split("/d/")[1].split("/")[0];

}

return "https://drive.google.com/thumbnail?id="+id+"&sz=w1000";

}

/* AMBIL DATA GOOGLE SHEET */

const sheetURL="https://docs.google.com/spreadsheets/d/19AfachAS9ZyNuut61RB1wqyI_AI6BsmNT1SIWhmSIn8/gviz/tq?sheet=PART%20HP";

fetch(sheetURL)

.then(res=>res.text())

.then(data=>{

const json=JSON.parse(data.substring(47).slice(0,-2));

let rows=json.table.rows;

let html="";

rows.forEach(r=>{

let nama=r.c[1]?.v;
let deskripsi=r.c[2]?.v;
let harga=r.c[3]?.v;
let foto=convertDrive(r.c[4]?.v);

if(!nama) return;

html+=`

<div class="produk-card">

<div class="produk-img-box">

<img src="${foto}" class="produk-img">

</div>

<div class="produk-info">

<div class="produk-nama">${nama}</div>

<div class="produk-deskripsi">${deskripsi ?? ""}</div>

<div class="produk-harga">

Rp ${Number(harga).toLocaleString()}

</div>

<button class="btn-cart"

onclick="tambahKeranjang('${nama}','${harga}','${foto}')">

+ Keranjang

</button>

</div>

</div>

`;

});

document.getElementById("produkList").innerHTML=html;

});

</script>

</body>
</html>
