<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checkout Pembayaran</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding-bottom:80px;
}

/* HEADER */

.header{
background:white;
padding:16px;
font-size:18px;
font-weight:bold;
display:flex;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.back{
font-size:22px;
margin-right:10px;
cursor:pointer;
}

/* CARD */

.card{
background:white;
margin:12px;
padding:16px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* PRODUK */

.produk{
border-bottom:1px solid #eee;
padding:8px 0;
}

.nama{
font-weight:bold;
}

.harga{
color:#16a34a;
font-weight:bold;
}

/* PAYMENT */

.pay{
border:1px solid #ddd;
padding:12px;
border-radius:8px;
margin-top:8px;
cursor:pointer;
}

.pay.active{
border:2px solid #16a34a;
}

/* TOTAL */

.total{
display:flex;
justify-content:space-between;
margin-top:6px;
font-size:14px;
}

.total span:last-child{
font-weight:bold;
}

/* BUTTON */

.btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#ee4d2d;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

/* REKENING */

#rekeningBox{
display:none;
margin-top:10px;
background:#f9fafb;
padding:12px;
border-radius:8px;
font-size:14px;
}

</style>
</head>

<body>

<div class="header">
<span class="back" onclick="window.location='cart.html'">⬅</span>
Checkout
</div>

<!-- PRODUK -->

<div class="card">

<b>Produk Dibeli</b>

<div id="produkList"></div>

</div>

<!-- METODE PEMBAYARAN -->

<div class="card">

<b>Metode Pembayaran</b>

<div class="pay" onclick="pilihMetode('COD',this)">
💵 COD (Bayar di Tempat)
</div>

<div class="pay" onclick="tampilTransfer()">
🏦 Transfer Bank
</div>

<div id="transferBox" style="display:none">

<div class="pay" onclick="pilihTransfer('BRI','0046 0105 1342 504','INA KHOZINATUL ASROR',this)">
🏦 Bank BRI
</div>

<div class="pay" onclick="pilihTransfer('DANA','082319264646','YUDI ALIYUDIN',this)">
💳 DANA
</div>

</div>

<div id="rekeningBox">

<b>Transfer ke:</b><br><br>

Bank BRI<br>
0046 0105 1342 504<br>
a.n INA KHOZINATUL ASROR<br><br>

DANA<br>
082319264646<br>
a.n YUDI ALIYUDIN

</div>

</div>

<!-- RINGKASAN -->

<div class="card">

<b>Ringkasan Pembayaran</b>

<div style="font-size:12px;color:#888;margin-bottom:6px">
Total <span id="jumlahItem"></span> Produk
</div>

<div class="total">
<span>Total Barang</span>
<span id="tBarang"></span>
</div>

<div class="total">
<span>Ongkir</span>
<span id="tOngkir"></span>
</div>

<div class="total">
<span>Diskon Member</span>
<span id="tDiskon"></span>
</div>

<hr>

<div class="total" style="font-weight:bold;color:#ee4d2d;font-size:16px">
<span>Total Bayar</span>
<span id="tTotal"></span>
</div>

<button class="btn" onclick="buatPesanan()">
Buat Pesanan
</button>

</div>


<script>

/* NORMALISASI WA */

function normalisasiWA(no){

no = no.replace(/\D/g,'');

if(no.startsWith("0")){
no = "62"+no.substring(1);
}

if(no.startsWith("8")){
no = "62"+no;
}

return no;

}

/* DATA */

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let checkoutData = JSON.parse(localStorage.getItem("checkoutData")) || {};

let metode="";
let bank="";
let norek="";
let an="";

/* HITUNG PRODUK */

let total=0;
let totalItem=0;

let html="";

cart.forEach(p=>{

let sub = p.harga * p.qty;

total += sub;
totalItem += p.qty;

html+=`
<div class="produk">
<div class="nama">${p.nama}</div>
Qty : ${p.qty}<br>
<span class="harga">Rp ${sub.toLocaleString("id-ID")}</span>
</div>
`;

});

document.getElementById("produkList").innerHTML=html;
document.getElementById("jumlahItem").innerText=totalItem;

/* ONGKIR */

let ongkir = checkoutData.ongkir || 0;

/* DATABASE PELANGGAN */

let noWa = normalisasiWA(checkoutData.noWa || "");

let db = JSON.parse(localStorage.getItem("dbPelanggan")) || {};

if(!db[noWa]){
db[noWa]=0;
}

let trx = db[noWa];

/* LEVEL */

let level="Member Baru";

if(trx>=3) level="Member Silver";
if(trx>=7) level="Member Gold";
if(trx>=15) level="Member Prioritas";

/* DISKON */

let diskon=0;

if(level=="Member Gold") diskon=5000;
if(level=="Member Prioritas") diskon=10000;

/* TOTAL */

let totalBayar = total + ongkir - diskon;

document.getElementById("tBarang").innerText="Rp "+total.toLocaleString("id-ID");
document.getElementById("tOngkir").innerText="Rp "+ongkir.toLocaleString("id-ID");
document.getElementById("tDiskon").innerText="Rp "+diskon.toLocaleString("id-ID");
document.getElementById("tTotal").innerText="Rp "+totalBayar.toLocaleString("id-ID");

/* PILIH METODE */

function pilihMetode(m,el){

if(m==="COD"){

if(trx < 10){

popupCOD(
"COD belum tersedia.<br><br>"+
"Belanja "+(10-trx)+" kali lagi untuk membuka COD"
);

return;

}

}

metode=m;

document.querySelectorAll(".pay").forEach(x=>x.classList.remove("active"));

el.classList.add("active");

}

/* TRANSFER */

function tampilTransfer(){

document.getElementById("transferBox").style.display="block";
document.getElementById("rekeningBox").style.display="block";

}

function pilihTransfer(b,n,a,el){

metode="TRANSFER";

bank=b;
norek=n;
an=a;

document.querySelectorAll(".pay").forEach(x=>x.classList.remove("active"));

el.classList.add("active");

}

/* POPUP */

function popupCOD(pesan){

let box=document.createElement("div");

box.style.position="fixed";
box.style.top="0";
box.style.left="0";
box.style.width="100%";
box.style.height="100%";
box.style.background="rgba(0,0,0,0.5)";
box.style.display="flex";
box.style.alignItems="center";
box.style.justifyContent="center";
box.style.zIndex="9999";

box.innerHTML=`
<div style="background:white;padding:20px;border-radius:12px;width:80%;max-width:300px;text-align:center">

<h3 style="color:#15803d;margin-top:0">TOKO SIAP ANTAR</h3>

<p>${pesan}</p>

<button onclick="this.parentElement.parentElement.remove()" style="background:#15803d;color:white;border:none;padding:10px 20px;border-radius:6px">OK</button>

</div>
`;

document.body.appendChild(box);

}

/* BUAT PESANAN */

function buatPesanan(){

if(!metode){
alert("Pilih metode pembayaran dulu");
return;
}

/* UPDATE TRANSAKSI */

db[noWa]++;

localStorage.setItem("dbPelanggan", JSON.stringify(db));

trx = db[noWa];

/* LOKASI */

let lat = checkoutData.lat;
let lng = checkoutData.lng;

let desa = checkoutData.desa;
let kecamatan = checkoutData.kecamatan;

let linkMaps="https://www.google.com/maps/search/?api=1&query="+lat+","+lng;

/* WAKTU */

let now=new Date();

let orderId=Date.now();

let tanggal=now.toLocaleDateString("id-ID");
let jam=now.toLocaleTimeString("id-ID");

/* DETAIL */

let detail="";

cart.forEach(p=>{

detail+=
"• "+p.nama+"\n"+
"  Qty: "+p.qty+"\n"+
"  Harga: Rp"+(p.harga*p.qty).toLocaleString("id-ID")+"\n\n";

});

/* PEMBAYARAN */

let infoBayar="";

if(metode=="COD"){
infoBayar="Metode Pembayaran : COD (Bayar di Tempat)";
}else{
infoBayar=
"Metode Pembayaran : TRANSFER\n\n"+
"Bank "+bank+"\n"+
norek+"\n"+
"a.n "+an+"\n\n"+
"Status : MENUNGGU TRANSFER";
}

/* PESAN WA */

let pesan=

"━━━━━━━━━━━━━━━━━━━━\n"+
"🧾 INVOICE PESANAN\n"+
"━━━━━━━━━━━━━━━━━━━━\n\n"+

"📌 ID Sistem : #"+orderId+"\n"+
"📅 Tanggal   : "+tanggal+"\n"+
"🕒 Jam       : "+jam+"\n"+
"🔢 Transaksi ke : "+trx+"\n"+
"⭐ Status Pelanggan : "+level+"\n\n"+

"👤 Nama Pembeli:\n"+(checkoutData.namaPembeli || "Pelanggan")+"\n"+
"📱 Nomor WhatsApp:\n"+noWa+"\n\n"+

"━━━━━━━━━━━━━━━━━━━━\n"+
"📦 DETAIL PRODUK\n"+
"━━━━━━━━━━━━━━━━━━━━\n\n"+
detail+

"━━━━━━━━━━━━━━━━━━━━\n"+
"💰 RINCIAN PEMBAYARAN\n"+
"━━━━━━━━━━━━━━━━━━━━\n\n"+

"Total Item   : "+totalItem+" pcs\n"+
"Total Barang : Rp"+total.toLocaleString("id-ID")+"\n"+
"Ongkir       : Rp"+ongkir.toLocaleString("id-ID")+"\n"+
"Diskon Member: Rp"+diskon.toLocaleString("id-ID")+"\n"+
"────────────────────\n"+
"TOTAL BAYAR  : Rp"+totalBayar.toLocaleString("id-ID")+"\n\n"+

"━━━━━━━━━━━━━━━━━━━━\n"+
"📍 LOKASI PENGIRIMAN\n"+
"━━━━━━━━━━━━━━━━━━━━\n"+
"Desa       : "+desa+"\n"+
"Kecamatan  : "+kecamatan+"\n"+
linkMaps+"\n\n"+

"━━━━━━━━━━━━━━━━━━━━\n"+
"💳 METODE PEMBAYARAN\n"+
"━━━━━━━━━━━━━━━━━━━━\n"+
infoBayar+"\n"+
"━━━━━━━━━━━━━━━━━━━━";

window.open(
"https://wa.me/62895707182299?text="+encodeURIComponent(pesan),
"_blank"
);

}

</script>

</body>
</html>
