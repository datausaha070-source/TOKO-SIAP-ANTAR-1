<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Checkout Pembayaran</title>
<meta name="viewport" content="width=device-width, initial-scale=1"><style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding-bottom:100px;
}

/* HEADER */

.header{
background:white;
padding:16px;
font-size:18px;
font-weight:bold;
display:flex;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.back{
font-size:22px;
margin-right:10px;
cursor:pointer;
}

/* CARD */

.card{
background:white;
margin:12px;
padding:16px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* PRODUK */

.produk{
border-bottom:1px solid #eee;
padding:8px 0;
}

.nama{
font-weight:bold;
}

.harga{
color:#16a34a;
font-weight:bold;
}

/* PAYMENT */

.pay{
border:1px solid #ddd;
padding:12px;
border-radius:8px;
margin-top:8px;
cursor:pointer;
}

.pay.active{
border:2px solid #16a34a;
}

/* TOTAL */

.total{
display:flex;
justify-content:space-between;
margin-top:6px;
}

/* FOOTER */

.footer{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
padding:12px;
box-shadow:0 -2px 8px rgba(0,0,0,0.1);
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:10px;
background:#ee4d2d;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

</style></head><body><div class="header">
<span class="back" onclick="window.location='cart.html'">⬅</span>
Checkout
</div><!-- DETAIL PRODUK --><div class="card"><b>Produk Dibeli</b>

<div id="produkList"></div></div><!-- METODE BAYAR --><div class="card"><b>Metode Pembayaran</b>

<div class="pay" onclick="pilihMetode('COD',this)">
💵 COD (Bayar di Tempat)
</div><div class="pay" onclick="tampilTransfer()">
🏦 Transfer Bank
</div><div id="transferBox" style="display:none"><div class="pay" onclick="pilihTransfer('BRI','0046 0105 1342 504','INA KHOZINATUL ASROR',this)">
🏦 Bank BRI
</div><div class="pay" onclick="pilihTransfer('DANA','082319264646','YUDI ALIYUDIN',this)">
💳 DANA
</div></div></div><!-- RINGKASAN --><div class="card"><b>Ringkasan Pembayaran</b>

<div class="total">
<span>Total Barang</span>
<span id="tBarang"></span>
</div><div class="total">
<span>Ongkir</span>
<span id="tOngkir"></span>
</div><div class="total">
<span>Diskon Member</span>
<span id="tDiskon"></span>
</div><hr><div class="total" style="font-weight:bold;color:#ee4d2d">
<span>Total Bayar</span>
<span id="tTotal"></span>
</div></div><div class="footer">
<button class="btn" onclick="buatPesanan()">Buat Pesanan</button>
</div><script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let checkoutData = JSON.parse(localStorage.getItem("checkoutData")) || {};

let metode="";
let bank="";
let norek="";
let an="";

/* TAMPIL PRODUK */

let total=0;
let totalItem=0;

let html="";

cart.forEach(p=>{

let sub = p.harga*p.qty;

total += sub;
totalItem += p.qty;

html+=`
<div class="produk">
<div class="nama">${p.nama}</div>
Qty : ${p.qty}<br>
<span class="harga">Rp ${sub.toLocaleString("id-ID")}</span>
</div>
`;

});

document.getElementById("produkList").innerHTML=html;

/* ONGKIR */

let ongkir = checkoutData.ongkir || 0;

/* MEMBER */

let noWa = checkoutData.noWa;

let db = JSON.parse(localStorage.getItem("dbPelanggan")) || {};

let trx = db[noWa] || 0;

let level="Member Baru";

if(trx>=3) level="Member Silver";
if(trx>=7) level="Member Gold";
if(trx>=15) level="Member Prioritas";

let diskon=0;

if(level=="Member Gold") diskon=5000;
if(level=="Member Prioritas") diskon=10000;

let totalBayar = total + ongkir - diskon;

/* TAMPIL TOTAL */

document.getElementById("tBarang").innerText="Rp "+total.toLocaleString("id-ID");
document.getElementById("tOngkir").innerText="Rp "+ongkir.toLocaleString("id-ID");
document.getElementById("tDiskon").innerText="Rp "+diskon.toLocaleString("id-ID");
document.getElementById("tTotal").innerText="Rp "+totalBayar.toLocaleString("id-ID");

/* PILIH METODE */

function pilihMetode(m,el){

if(m==="COD"){

let db = JSON.parse(localStorage.getItem("dbPelanggan")) || {};
let noWa = checkoutData.noWa;

let trx = db[noWa] || 0;

if(trx < 10){

let sisa = 10 - trx;

popupCOD(
"COD belum tersedia.<br><br>"+
"Belanja <b>"+sisa+" kali lagi</b><br>"+
"untuk membuka fitur COD."
);

return;

}

}

metode=m;

document.querySelectorAll(".pay").forEach(x=>x.classList.remove("active"));

el.classList.add("active");

}

function tampilTransfer(){

document.getElementById("transferBox").style.display="block";

}

function pilihTransfer(b,n,a,el){

metode="TRANSFER";

bank=b;
norek=n;
an=a;
<div id="rekeningBox" style="
display:none;
margin-top:10px;
background:#f9fafb;
padding:12px;
border-radius:8px;
font-size:14px;
">

<b>Transfer ke:</b><br><br>

Bank BRI<br>
0046 0105 1342 504<br>
a.n INA KHOZINATUL ASROR<br><br>

DANA<br>
082319264646<br>
a.n YUDI ALIYUDIN

</div>
document.querySelectorAll(".pay").forEach(x=>x.classList.remove("active"));

el.classList.add("active");

}
function popupCOD(pesan){

document.getElementById("pesanCOD").innerHTML=pesan;
document.getElementById("popupCOD").style.display="flex";

}

function tutupPopup(){

document.getElementById("popupCOD").style.display="none";

}

/* BUAT PESANAN */

function buatPesanan(){

if(!metode){
alert("Pilih metode pembayaran dulu");
return;
}

let lat = checkoutData.lat;
let lng = checkoutData.lng;
let desa = checkoutData.desa;
let kecamatan = checkoutData.kecamatan;

let linkMaps="https://www.google.com/maps/search/?api=1&query="+lat+","+lng;

let now=new Date();

let orderId=Date.now();

let tanggal=now.toLocaleDateString("id-ID");
let jam=now.toLocaleTimeString("id-ID");

let detail="";

cart.forEach(p=>{

detail+=
"• "+p.nama+"\n"+
"  Qty: "+p.qty+"\n"+
"  Harga: Rp"+(p.harga*p.qty).toLocaleString("id-ID")+"\n\n";

});

let infoBayar="";

if(metode=="COD"){

infoBayar="Metode Pembayaran : COD (Bayar di Tempat)";

}else{

infoBayar=
"Metode Pembayaran : TRANSFER\n\n"+
"Bank "+bank+"\n"+
norek+"\n"+
"a.n "+an+"\n\n"+
"Status : MENUNGGU TRANSFER";

}

let pesan=
"━━━━━━━━━━━━━━━━━━━━\n"+
"🧾 INVOICE PESANAN\n"+
"━━━━━━━━━━━━━━━━━━━━\n\n"+

"📌 ID Sistem : #"+orderId+"\n"+
"📅 Tanggal   : "+tanggal+"\n"+
"🕒 Jam       : "+jam+"\n"+
"🔢 Transaksi ke : "+trx+"\n"+
"⭐ Status Pelanggan : "+level+"\n\n"+

"👤 Nama Pembeli:\n"+checkoutData.namaPembeli+"\n"+
"📱 Nomor WhatsApp:\n"+checkoutData.noWa+"\n\n"+

"━━━━━━━━━━━━━━━━━━━━\n"+
"📦 DETAIL PRODUK\n"+
"━━━━━━━━━━━━━━━━━━━━\n\n"+
detail+

"━━━━━━━━━━━━━━━━━━━━\n"+
"💰 RINCIAN PEMBAYARAN\n"+
"━━━━━━━━━━━━━━━━━━━━\n\n"+

"Total Item   : "+totalItem+" pcs\n"+
"Total Barang : Rp"+total.toLocaleString("id-ID")+"\n"+
"Ongkir       : Rp"+ongkir.toLocaleString("id-ID")+"\n"+
"Diskon Member: Rp"+diskon.toLocaleString("id-ID")+"\n"+
"────────────────────\n"+
"TOTAL BAYAR  : Rp"+totalBayar.toLocaleString("id-ID")+"\n\n"+

"━━━━━━━━━━━━━━━━━━━━\n"+
"📍 LOKASI PENGIRIMAN\n"+
"━━━━━━━━━━━━━━━━━━━━\n"+
"Desa       : "+desa+"\n"+
"Kecamatan  : "+kecamatan+"\n"+
linkMaps+"\n\n"+

"━━━━━━━━━━━━━━━━━━━━\n"+
"💳 METODE PEMBAYARAN\n"+
"━━━━━━━━━━━━━━━━━━━━\n"+
infoBayar+"\n"+
"━━━━━━━━━━━━━━━━━━━━";

window.open(
"https://wa.me/62895707182299?text="+encodeURIComponent(pesan),
"_blank"
);

}

</script>
<div id="popupCOD" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
align-items:center;
justify-content:center;
z-index:9999;
">

<div style="
background:white;
padding:20px;
border-radius:10px;
width:80%;
max-width:320px;
text-align:center;
">

<h3 style="color:#15803d;margin-top:0">
TOKO SIAP ANTAR
</h3>

<p id="pesanCOD"></p>

<button onclick="tutupPopup()"
style="
background:#15803d;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
">
OK
</button>

</div>
</div>
</body>
</html>
