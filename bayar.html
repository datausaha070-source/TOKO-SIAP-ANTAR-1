<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Checkout Pembayaran</title>
<meta name="viewport" content="width=device-width, initial-scale=1"><style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding-bottom:90px;
}

/* HEADER */

.header{
background:white;
padding:16px;
display:flex;
align-items:center;
font-size:18px;
font-weight:bold;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.back{
font-size:22px;
margin-right:10px;
cursor:pointer;
}

/* CARD */

.card{
background:white;
margin:12px;
padding:16px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* TITLE */

.title{
font-weight:bold;
margin-bottom:10px;
font-size:16px;
}

/* PAYMENT ITEM */

.pay-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
border-radius:10px;
border:1px solid #e5e5e5;
margin-top:8px;
cursor:pointer;
transition:0.2s;
}

.pay-item:hover{
background:#fafafa;
}

.pay-left{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
}

/* TOTAL */

.total-box{
display:flex;
justify-content:space-between;
font-size:16px;
margin-top:8px;
}

/* FOOTER */

.footer{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
padding:12px;
box-shadow:0 -2px 8px rgba(0,0,0,0.1);
}

.btn-order{
width:100%;
padding:16px;
border:none;
border-radius:10px;
background:#ee4d2d;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.btn-back{
background:#9ca3af;
color:white;
border:none;
padding:12px;
border-radius:8px;
margin-top:10px;
width:100%;
}

</style></head><body><!-- HEADER --><div class="header">
<span class="back" onclick="kembali()">⬅</span>
Checkout
</div><!-- METODE PEMBAYARAN --><div class="card"><div class="title">Metode Pembayaran</div><div id="btnCOD" class="pay-item" onclick="pilihCOD()">
<div class="pay-left">💵 COD (Bayar di Tempat)</div>
</div><div class="pay-item" onclick="tampilkanTransfer()">
<div class="pay-left">🏦 Transfer Bank</div>
</div><div id="opsiTransfer" style="display:none"><div class="pay-item" onclick="pilihTransfer('BRI','0046 0105 1342 504','INA KHOZINATUL ASROR')">
<div class="pay-left">🏦 Bank BRI</div>
</div><div class="pay-item" onclick="pilihTransfer('DANA','082319264646','YUDI ALIYUDIN')">
<div class="pay-left">💳 DANA</div>
</div></div><button class="btn-back" onclick="kembali()">← Kembali ke Keranjang</button>

</div><!-- RINGKASAN --><div class="card"><div class="title">Ringkasan Pembayaran</div><div class="total-box">
<span>Total Produk</span>
<span id="totalProduk">-</span>
</div><div class="total-box">
<span>Ongkir</span>
<span id="ongkirBayar">-</span>
</div><div class="total-box">
<span>Diskon Member</span>
<span id="diskonMember">-</span>
</div><hr><div class="total-box" style="font-weight:bold;color:#ee4d2d">
<span>Total Bayar</span>
<span id="totalBayar">-</span>
</div></div><!-- FOOTER --><div class="footer">
<button class="btn-order" onclick="pilihCOD()">
Buat Pesanan
</button>
</div><script>

/* ================== HITUNG TOTAL ================== */

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let checkoutData = JSON.parse(localStorage.getItem("checkoutData")) || {};

let ongkir = checkoutData.ongkir || 0;

let total = 0;

cart.forEach(p=>{
total += p.harga * p.qty;
});

document.getElementById("totalProduk").innerText =
"Rp " + total.toLocaleString("id-ID");

document.getElementById("ongkirBayar").innerText =
"Rp " + ongkir.toLocaleString("id-ID");

document.getElementById("diskonMember").innerText =
"Rp 0";

document.getElementById("totalBayar").innerText =
"Rp " + (total+ongkir).toLocaleString("id-ID");

</script><script src="bayar-script.js"></script></body>
</html>
