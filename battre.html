<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Produk LCD</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f2f2f2;
  padding-bottom:80px;
}
header{
  background:#15803d;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
}
.card{
  background:white;
  margin:10px;
  padding:12px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
.harga{
  color:#15803d;
  font-weight:bold;
}
button{
  background:#15803d;
  color:white;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  margin-top:8px;
  cursor:pointer;
}
.qtyBox{
  margin-top:8px;
}
.qtyBox button{
  padding:4px 10px;
}
.cartBtn{
  position:fixed;
  bottom:0;
  width:100%;
  background:#15803d;
  color:white;
  text-align:center;
  padding:15px;
  font-weight:bold;
  text-decoration:none;
}
input{
  width:95%;
  margin:10px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<header>📱 Produk LCD</header>

<input type="text" id="searchInput" placeholder="🔍 Cari produk..." onkeyup="renderProduk()">

<div id="listProduk"></div>

<a href="cart.html" class="cartBtn">🛒 Lihat Keranjang</a>

<script>

// ================= GOOGLE SHEET =================
const sheetId = "1iPbtRGldW5yz6tuUZ5oHzMGsnNb4cHyCbAEMkq51qK4";
const sheetName = "BATRE";

function rupiah(angka){
  return Math.round(angka).toLocaleString("id-ID");
}

let semuaProduk = [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// ================= AMBIL DATA =================
fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?sheet=${sheetName}`)
.then(res => res.text())
.then(data => {
  let json = JSON.parse(data.substring(47).slice(0,-2));

  semuaProduk = json.table.rows
  .filter(r => r.c && r.c[0])
  .map(r => ({
    kode: r.c[7]?.v || "",
    nama: r.c[1]?.v || "",
    harga: Number(r.c[4]?.v || 0)
  }));

  renderProduk();
})
.catch(err => console.log("Gagal ambil sheet:", err));


// ================= RENDER PRODUK =================
function renderProduk(){

  let list = document.getElementById("listProduk");
  let keyword = document.getElementById("searchInput").value.toLowerCase();

  list.innerHTML = "";

  semuaProduk
  .filter(p =>
    p.nama.toLowerCase().includes(keyword) ||
    p.kode.toLowerCase().includes(keyword)
  )
  .forEach(p => {

    let item = cart.find(c => c.kode === p.kode);
    let qty = item ? item.qty : 0;

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML =
      "<b>"+p.nama+"</b><br>" +
      p.kode + "<br>" +
      "<span class='harga'>Rp "+rupiah(p.harga)+"</span>";

    if(qty === 0){

      let btn = document.createElement("button");
      btn.innerText = "+ Tambah";
      btn.onclick = function(){
        tambahProduk(p);
      };
      div.appendChild(document.createElement("br"));
      div.appendChild(btn);

    } else {

      let box = document.createElement("div");
      box.className = "qtyBox";
      box.innerHTML =
        "<button onclick=\"kurang('"+p.kode+"')\">-</button> " +
        qty +
        " <button onclick=\"tambahQty('"+p.kode+"')\">+</button>";

      div.appendChild(box);
    }

    list.appendChild(div);

  });
}


// ================= CART SYSTEM =================
function tambahProduk(p){

  let item = cart.find(x => x.kode === p.kode);

  if(item){
    item.qty++;
  } else {
    cart.push({...p, qty:1});
  }

  simpan();
}

function tambahQty(kode){
  let item = cart.find(p => p.kode === kode);
  if(item) item.qty++;
  simpan();
}

function kurang(kode){
  let item = cart.find(p => p.kode === kode);
  if(item){
    item.qty--;
    if(item.qty <= 0){
      cart = cart.filter(p => p.kode !== kode);
    }
  }
  simpan();
}

function simpan(){
  localStorage.setItem("cart", JSON.stringify(cart));
  renderProduk();
}

</script>

</body>
</html>
