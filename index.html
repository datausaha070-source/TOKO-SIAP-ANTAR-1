<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOKO SIAP ANTAR | Kategori Produk</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f6f9;
color:#333;
}

/* HEADER */
.header{
background:white;
display:flex;
align-items:center;
justify-content:center;
height:450px;
position:relative;
overflow:hidden;
}

.header::after{
content:"";
position:absolute;
bottom:0;
left:0;
width:100%;
height:4px;
background:linear-gradient(90deg,#16a34a,#f97316);
}

/* SLIDER */
.slider{
width:100%;
overflow:hidden;
}

.slider-track{
display:flex;
width:max-content;
animation:slidejalan 60s linear infinite;
}

.slider-track img{
width:220px;
margin:0 10px;
border-radius:10px;
}

@keyframes slidejalan{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* LOGO */
.logo-tengah{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:-160px;
width:320px;
height:320px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
border:16px solid transparent;

background-image:
linear-gradient(white,white),
linear-gradient(135deg,#16a34a,#f97316);

background-origin:border-box;
background-clip:content-box,border-box;
}

.logo-tengah img{
width:55%;
margin-top:-130px;
}

/* MOTOR */
.motor-jalan{
position:relative;
height:40px;
overflow:hidden;
}

.motor-kirim{
position:absolute;
left:-120px;
animation:jalanmotor 12s linear infinite;
}

.motor-kirim img{
height:36px;
}

@keyframes jalanmotor{
0%{left:-120px;}
100%{left:100%;}
}

/* RUNNING TEXT */
.running-text{
background:#16a34a;
color:white;
font-weight:bold;
font-size:14px;
padding:6px;
}

.garis{
height:3px;
background:linear-gradient(90deg,#16a34a,#f97316);
}

/* HERO */
.hero{
padding:35px 20px;
text-align:center;
background:white;
}

.hero h2{
color:#16a34a;
font-size:26px;
margin-bottom:10px;
}

/* KATEGORI GRID */

.kategori-container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
max-width:900px;
margin:auto;
}

.kategori-card{
background:white;
border-radius:12px;
padding:25px;
text-align:center;
box-shadow:0 6px 18px rgba(0,0,0,0.12);
border:3px solid #f97316;
cursor:pointer;
transition:0.2s;
text-decoration:none;
}

.kategori-card:hover{
transform:scale(1.05);
}

.kategori-icon{
font-size:40px;
margin-bottom:10px;
}

.kategori-nama{
font-weight:bold;
color:#16a34a;
font-size:16px;
}

/* CART FLOAT */

#cartFloat{
position:fixed;
top:450px;
left:15px;
background:linear-gradient(145deg,#16a34a,#15803d);
color:white;
padding:10px 16px;
border-radius:50px;
border:3px solid #ff9800;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
cursor:pointer;
z-index:9999;
}

</style>
</head>
