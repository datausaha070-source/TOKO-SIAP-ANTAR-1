<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Keranjang Belanja</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;padding-bottom:170px}

header{
background:#15803d;
color:white;
padding:15px;
text-align:center;
font-weight:bold
}

.card{
background:white;
margin:10px;
padding:12px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

.harga{color:#15803d;font-weight:bold}

button{
padding:6px 12px;
border:none;
border-radius:6px;
margin:3px;
cursor:pointer
}

.green{background:#15803d;color:white}
.gray{background:#9ca3af;color:white}

#map{
height:260px;
margin:10px;
border-radius:10px
}

input{
width:95%;
margin:10px;
padding:10px;
border-radius:8px;
border:1px solid #ccc
}

.checkout{
position:fixed;
bottom:60px;
width:100%;
background:#15803d;
color:white;
padding:15px;
text-align:center;
font-weight:bold
}

.clearBtn{
position:fixed;
bottom:0;
width:100%;
background:#9ca3af;
color:white;
padding:15px;
text-align:center;
font-weight:bold
}
</style>
</head>

<body>

<header>🛒 Keranjang Belanja</header>

<div id="cartList"></div>

<h3 style="margin-left:10px;">📍 Pilih Lokasi Pengiriman</h3>

<div id="map"></div>

<button class="green" onclick="gunakanLokasi()" style="margin-left:10px;">
📡 Gunakan Lokasi Saya Untuk Pengiriman Pesanan
</button>

<div id="infoZona" class="card">Belum memilih lokasi</div>

<input type="tel" id="waPembeli" placeholder="Nomor WhatsApp Aktif">

<div class="checkout" onclick="lanjutBayar()">Checkout</div>

<div class="clearBtn" onclick="kosongkan()">Kosongkan Keranjang</div>

<script>

// ================= DATA =================

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const tokoLat = -6.883831;
const tokoLng = 108.302788;

let tujuanLat=null;
let tujuanLng=null;
let ongkir=0;
let jarakFix=0;
let minimalBelanja=0;

let namaDesa="-";
let namaKecamatan="-";

let markerUser=null;
let markerMotor=null;

function rupiah(a){
return Math.round(a).toLocaleString("id-ID");
}

// ================= RENDER CART =================

function renderCart(){

let list=document.getElementById("cartList");

list.innerHTML="";

let total=0;

cart.forEach((p,i)=>{

let sub=p.harga*p.qty;

total+=sub;

list.innerHTML+=`
<div class="card">
<b>${p.nama}</b><br>
<span class="harga">Rp ${rupiah(p.harga)}</span><br>

<button onclick="kurang(${i})">-</button>
${p.qty}
<button onclick="tambah(${i})">+</button>
<button onclick="hapus(${i})">Hapus</button>

<br>Subtotal: Rp ${rupiah(sub)}
</div>
`;

});

let totalBayar=total+ongkir;

list.innerHTML+=`
<div class="card">
<b>Total Barang : Rp ${rupiah(total)}</b><br>
<b>Ongkir : Rp ${rupiah(ongkir)}</b>

<hr>

<b style="color:#15803d;font-size:18px">
TOTAL BAYAR : Rp ${rupiah(totalBayar)}
</b>
</div>
`;

}

function tambah(i){cart[i].qty++;simpan();}
function kurang(i){cart[i].qty--;if(cart[i].qty<=0)cart.splice(i,1);simpan();}
function hapus(i){cart.splice(i,1);simpan();}

function kosongkan(){
localStorage.removeItem("cart");
location.reload();
}

function simpan(){
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

// ================= CHECKOUT =================

function lanjutBayar(){

if(!tujuanLat){
popup("Pilih lokasi pengiriman dulu");
return;
}

let noWa=document.getElementById("waPembeli").value.trim();

if(!noWa){
popup("Isi nomor WhatsApp dulu");
return;
}

localStorage.setItem("checkoutData",JSON.stringify({

lat:tujuanLat,
lng:tujuanLng,
desa:namaDesa,
kecamatan:namaKecamatan,
ongkir:ongkir,
noWa:noWa

}));

window.location.href="bayar.html";

}

// ================= MAP =================

var map=L.map('map').setView([tokoLat,tokoLng],15);

var normalLayer=L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}).addTo(map);

var satelliteLayer=L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:19});

var satelliteWithLabel=L.layerGroup([satelliteLayer]);

L.control.layers({
"Peta Normal":normalLayer,
"Satelit":satelliteLayer,
"Satelit + Nama":satelliteWithLabel
}).addTo(map);

L.marker([tokoLat,tokoLng])
.addTo(map)
.bindPopup("🏪 Lokasi Toko")
.openPopup();

map.on('click',function(e){
setLokasi(e.latlng.lat,e.latlng.lng);
});

function gunakanLokasi(){

navigator.geolocation.getCurrentPosition(function(pos){

setLokasi(pos.coords.latitude,pos.coords.longitude);

});

}

// ================= SET LOKASI =================

function setLokasi(lat,lng){

tujuanLat=lat;
tujuanLng=lng;

if(markerUser) map.removeLayer(markerUser);

markerUser=L.marker([lat,lng])
.addTo(map)
.bindPopup("Lokasi Pengiriman")
.openPopup();

map.setView([lat,lng],17);

fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
.then(res=>res.json())
.then(data=>{

namaDesa=data.address.village||data.address.suburb||"-";
namaKecamatan=data.address.subdistrict||data.address.county||"-";

hitungOngkir();

});

}

// ================= ONGKIR =================

function hitungOngkir(){

jarakFix=map.distance([tokoLat,tokoLng],[tujuanLat,tujuanLng])/1000;

ongkir=Math.ceil(jarakFix*2000);

if(ongkir<5000) ongkir=5000;

document.getElementById("infoZona").innerHTML=

"Jarak: "+jarakFix.toFixed(1)+" km<br>"+
"Ongkir: Rp "+rupiah(ongkir)+"<br>"+
"Desa: "+namaDesa+"<br>"+
"Kecamatan: "+namaKecamatan;

renderCart();

}

// ================= POPUP =================

function popup(pesan){

alert(pesan);

}

renderCart();

</script>

</body>
</html>
