<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A YUDI THEA | Servis Handphone</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f6f9;
color:#333;
}

/* ===== COLOR ===== */
:root{
--primary:#1faa59;
--primary-dark:#178a47;
--accent:#ff9800;
--accent-dark:#e68900;
}

/* HEADER */
.header{
background:white;
display:flex;
align-items:center;
justify-content:center;
height:420px;
position:relative;
}

.header img{
width:90%;
max-width:480px;
}

.header::after{
content:"";
position:absolute;
bottom:0;
left:0;
width:100%;
height:4px;
background:linear-gradient(90deg,var(--primary),var(--accent));
}

/* HERO */
.hero{
padding:40px 20px;
text-align:center;
background:white;
}

.hero h2{
color:var(--primary);
margin-bottom:10px;
}

.hero p{
color:#666;
margin-bottom:20px;
}

/* BUTTON */
.btn-modern{
display:inline-block;
padding:14px 22px;
border-radius:40px;
color:white;
text-decoration:none;
font-weight:600;
box-shadow:0 6px 15px rgba(0,0,0,0.25);
}

.btn-green{
background:linear-gradient(145deg,#16a34a,#15803d);
}

.btn-orange{
background:linear-gradient(145deg,#f59e0b,#ea580c);
}

/* MENU */
.menu-pro{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
margin-top:25px;
}

.menu-pro a{
padding:12px 20px;
background:linear-gradient(145deg,#16a34a,#15803d);
color:white;
border-radius:40px;
text-decoration:none;
}

/* PRODUK */
.produk-container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:15px;
max-width:900px;
margin:auto;
}

.produk-card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.produk-img{
width:100%;
height:150px;
object-fit:cover;
}

.produk-info{
padding:10px;
}

.produk-nama{
font-size:14px;
font-weight:600;
}

.produk-harga{
color:#ff6a00;
font-weight:bold;
margin:6px 0;
}

.btn-cart{
width:100%;
border:none;
background:#1faa59;
color:white;
padding:8px;
border-radius:6px;
}

/* CART FLOAT */
#cartFloat{
position:fixed;
bottom:25px;
right:20px;
background:linear-gradient(145deg,#16a34a,#15803d);
color:white;
padding:12px 18px;
border-radius:50px;
font-weight:600;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
cursor:pointer;
z-index:9999;
}

#cartCount{
background:#ff9800;
padding:3px 8px;
border-radius:50px;
font-size:12px;
}

</style>
</head>

<body>

<!-- FLOAT CART -->
<div id="cartFloat" onclick="window.location.href='cart.html'">
🛒 <span id="cartCount">0</span>
</div>

<!-- HEADER -->
<div class="header">
<img src="logo2.png" alt="Toko Siap Antar">
</div>

<!-- HERO -->
<div class="hero">
<h2>🔧 Spesialis LCD, Baterai & IC Handphone</h2>
<p>Ready Stock • Harga Grosir • Bergaransi</p>

<a href="#" class="btn-modern btn-green">
🚚 Estimasi pengiriman 2 / 3 hari →
</a>

<a href="siapantar.html" class="btn-modern btn-orange">
📦 Minimal 20pcs setiap pengambilan →
</a>

</div>

<!-- MENU -->
<div class="menu-pro">
<a href="lcd.html?kategori=LCD">📱 LCD</a>
<a href="kategori.html?kategori=BATERAI">🔋 Baterai</a>
<a href="kategori.html?kategori=IC">🧩 IC</a>
<a href="kategori.html?kategori=SPEAKER">🔊 Speaker</a>
<a href="cart.html">🛒 Keranjang</a>
</div>

<!-- PRODUK -->
<div id="produkList" class="produk-container"></div>

<!-- FOOTER -->
<div style="text-align:center;margin-top:30px">

📍 Lokasi Toko Kami<br><br>

<a href="https://www.google.com/maps?q=-6.883831,108.302788"
target="_blank"
class="btn-modern btn-orange">
Buka di Google Maps
</a>

<br><br>

WA: 082319264646

</div>

<!-- SCRIPT CART -->
<script>

function updateCartCount(){
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total=0;

cart.forEach(p=>{
total+=p.qty;
});

document.getElementById("cartCount").innerText=total;
}

updateCartCount();
function convertDrive(link){

if(!link) return "";

let id = "";

if(link.includes("id=")){
id = link.split("id=")[1];
}

if(link.includes("/d/")){
id = link.split("/d/")[1].split("/")[0];
}

return "https://drive.google.com/uc?export=view&id="+id;

}
</script>

<!-- SCRIPT PRODUK GOOGLE SHEET -->
<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/19AfachAS9ZyNuut61RB1wqyI_AI6BsmNT1SIWhmSIn8/gviz/tq?sheet=MEMBER";

fetch(sheetURL)
.then(res => res.text())
.then(data => {

const json = JSON.parse(data.substring(47).slice(0,-2));

let rows = json.table.rows;

let html = "";

rows.forEach(r=>{

let nama = r.c[1]?.v;
let harga = r.c[7]?.v;
let foto = convertDrive(r.c[9]?.v);
if(!nama) return;

html += `
<div class="produk-card">

<div class="produk-img"
style="display:flex;align-items:center;justify-content:center;height:150px;background:#eee">

<a href="${foto}" target="_blank"
style="text-decoration:none;color:#1faa59;font-weight:bold">
📷 Lihat Foto
</a>

</div>
<div class="produk-info">

<div class="produk-nama">${nama}</div>

<div class="produk-harga">
Rp ${Number(harga).toLocaleString()}
</div>

<button class="btn-cart"
onclick="tambahKeranjang('${nama}','${harga}','${foto}')">
+ Keranjang
</button>

</div>
</div>
`;

});

document.getElementById("produkList").innerHTML = html;

});

</script>

</body>
</html>
